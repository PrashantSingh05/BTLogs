{% extends 'base.html' %}

{% block content %}
<h3>Edit Log</h3>

<form method="POST" class="mt-3">

    <!-- 🔐 CSRF TOKEN (ADD THIS LINE) -->
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <input name="title" value="{{ log['title'] }}" class="form-control mb-2" required>

    <textarea name="description" class="form-control mb-2">{{ log['description'] }}</textarea>

    <select name="category" class="form-control mb-2">
        <option value="hardware" {% if log['category']=='hardware' %}selected{% endif %}>Hardware</option>
        <option value="network" {% if log['category']=='network' %}selected{% endif %}>Network</option>
        <option value="process" {% if log['category']=='process' %}selected{% endif %}>Process</option>
        <option value="manual" {% if log['category']=='manual' %}selected{% endif %}>Manual</option>
    </select>

    <input name="action_type" value="{{ log['action_type'] }}" class="form-control mb-2">

    <textarea name="reason" class="form-control mb-2">{{ log['reason'] }}</textarea>

    <select name="impact_level" class="form-control mb-2">
        <option value="low" {% if log['impact_level']=='low' %}selected{% endif %}>Low</option>
        <option value="medium" {% if log['impact_level']=='medium' %}selected{% endif %}>Medium</option>
        <option value="high" {% if log['impact_level']=='high' %}selected{% endif %}>High</option>
    </select>

    <input name="tags" value="{{ log['tags'] }}" class="form-control mb-2">

    <input name="system_name" value="{{ log['system_name'] }}" class="form-control mb-2">

    <input name="created_by" value="{{ log['created_by'] }}" class="form-control mb-2">

    <button class="btn btn-success">Update Log</button>

</form>
{% endblock %}
