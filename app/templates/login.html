<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<form method="POST" class="p-4 border rounded" style="width:300px;">

    <!-- 🔐 CSRF TOKEN -->
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <h4>Login</h4>

    <input name="username" class="form-control mb-2" placeholder="Username">
    <input name="password" type="password" class="form-control mb-2" placeholder="Password">

    <button class="btn btn-dark w-100">Login</button>

    <a href="/register" class="d-block mt-2 text-center">New user? Register</a>

</form>

</body>
</html>
