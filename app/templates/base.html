<!DOCTYPE html>
<html>
<head>
    <title>BTLogs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body.dark-mode {
            background-color: #121212;
            color: #ffffff;
        }

        .dark-mode .card {
            background-color: #1e1e1e;
            color: white;
        }

        .dark-mode table {
            color: white;
        }

        .dark-mode .table-dark {
            background-color: #333;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand fw-bold" href="/">BTLogs</a>

    <div class="ms-auto">

        <a href="/" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        <a href="/logs" class="btn btn-outline-light btn-sm me-2">Logs</a>

        {% if session.get('role') != 'viewer' %}
        <a href="/add" class="btn btn-outline-light btn-sm me-2">Add</a>
        {% endif %}

        {% if session.get('role') == 'admin' %}
        <a href="/admin" class="btn btn-warning btn-sm me-2">Admin</a>
        {% endif %}

        <!-- 🌙 Toggle -->
        <button onclick="toggleDarkMode()" class="btn btn-secondary btn-sm me-2">
            🌙
        </button>

        <span class="text-white me-2">
            {{ session['user'] }} ({{ session['role'] }})
        </span>

        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>

    </div>

</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");

    // save preference
    localStorage.setItem("darkMode",
        document.body.classList.contains("dark-mode"));
}

// load preference
window.onload = function() {
    if (localStorage.getItem("darkMode") === "true") {
        document.body.classList.add("dark-mode");
    }
}
</script>

</body>
</html>
